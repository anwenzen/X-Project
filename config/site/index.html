<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f7f7f8;
      color: #24292f;
    }
    .card {
      text-align: center;
      padding: 48px 40px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
      max-width: 460px;
    }
    h1 { font-size: 22px; margin: 0 0 12px; }
    p { font-size: 15px; line-height: 1.6; color: #57606a; margin: 0; }
    .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#2da44e; margin-right:6px; vertical-align:middle; }
  </style>
</head>
<body>
  <div class="card">
    <h1>It works!</h1>
    <p><span class="dot"></span>This site is running and reachable over HTTPS.</p>
  </div>
</body>
</html>
